<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Energy-AI Nexus</title>
  <link rel="stylesheet" href="/ui/style.css" />
</head>
<body>
  <header id="topbar">
    <div class="metric"><span class="label">Day</span><span id="day">—</span></div>
    <div class="metric"><span class="label">Treasury</span>$<span id="treasury">—</span></div>
    <div class="metric"><span class="label">Population</span><span id="population">—</span></div>
    <div class="metric"><span class="label">Happiness</span><span id="happiness">—</span></div>
    <div class="metric"><span class="label">Balance</span><span id="balance">—</span></div>
    <button id="next-day" disabled>Next Day</button>
  </header>
  <main>
    <canvas id="grid" width="640" height="640"></canvas>
  </main>
  <script src="/ui/app.js"></script>
</body>
</html>
