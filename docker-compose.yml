services:
  world:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      WORLD_SEED: "${WORLD_SEED:-42}"
      GAME_DAYS: "${GAME_DAYS:-3650}"
      MANUAL_GAME_DAYS: "${MANUAL_GAME_DAYS:-365}"
      WORLD_W: "${WORLD_W:-32}"
      WORLD_H: "${WORLD_H:-32}"
      WORLD_D: "${WORLD_D:-16}"
    volumes:
      - ./runs:/app/runs

  # Opt-in evaluator: `docker compose --profile eval run agent`.
  # Mounts the participant's submit/ read-only and runs evaluate.py
  # against the world service over HTTP.
  agent:
    build: .
    depends_on: [world]
    profiles: ["eval"]
    environment:
      WORLD_API_URL: "http://world:8000"
      # LLM_PROVIDER is the only switch; each provider reads its own
      # namespaced vars. Pass through every provider's settings so a
      # single `.env` works regardless of which one LLM_PROVIDER selects.
      LLM_PROVIDER: "${LLM_PROVIDER:-openai}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-}"
      NVIDIA_API_KEY: "${NVIDIA_API_KEY:-}"
      NVIDIA_BASE_URL: "${NVIDIA_BASE_URL:-}"
      NVIDIA_MODEL: "${NVIDIA_MODEL:-}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-}"
      NIM_BASE_URL: "${NIM_BASE_URL:-}"
      NIM_MODEL: "${NIM_MODEL:-}"
      NIM_CHAT_TEMPLATE_KWARGS: "${NIM_CHAT_TEMPLATE_KWARGS:-}"
    volumes:
      - ./submit:/app/submit:ro
      - ./runs:/app/runs
    command: python evaluate.py --agent submit.agent --seed ${WORLD_SEED:-42}
